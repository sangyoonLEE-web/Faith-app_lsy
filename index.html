      let currentTab = "bible1";

      function showContent(key) {
        document
          .querySelectorAll(".emotion-btn")
          .forEach((b) => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        const d = data[key];
        const area = document.getElementById("content-area");
        area.innerHTML = `
              <div class="content-panel visible" id="panel-${key}">
                <button class="back-btn" onclick="goBack()">← 다시 선택하기</button>
                <div class="panel-header">
                  <div class="panel-title">${d.emoji} ${d.title}</div>
                  <div class="panel-subtitle">${d.sub}</div>
                </div>
                <div class="tab-bar">
                  <button class="tab-btn active" onclick="switchTab('bible','${key}',this)">📖 성경 말씀</button>

                  <button class="tab-btn" onclick="switchTab('sermon','${key}',this)">📺 목사님 말씀</button>
                  <button class="tab-btn" onclick="switchTab('prayer','${key}',this)">🕊 기도문</button>
                </div>
                <div class="tab-content active" id="tab-bible-${key}">
                  ${d.bible
                    .map(
                      (b) => `
                    <div class="bible-card">
                      <div class="bible-reference">${b.ref}</div>
                      <div class="bible-text">${b.text}</div>
                    </div>
                  `,
                    )
                    .join("")}
                </div>
                <div class="tab-content" id="tab-praise-${key}">
                  <div class="media-grid">${d.praise.map((m) => makeCard(m)).join("")}</div>
                </div>
                <div class="tab-content" id="tab-testimony-${key}">
                  <div class="media-grid">${d.testimony.map((m) => makeCard(m)).join("")}</div>
                </div>
                <div class="tab-content" id="tab-sermon-${key}">
                  <div class="media-grid">${d.sermon.map((m) => makeCard(m)).join("")}</div>
                </div>
                <div class="tab-content" id="tab-prayer-${key}">
                  <div class="prayer-card">${d.prayer}</div>
                </div>
              </div>
            `;
        area.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function makeCard(m) {
        return `
              <a class="media-card" href="${m.url}" target="_blank" rel="noopener">
                <div class="media-thumb">
                  <div class="thumb-gradient"></div>
                  <div class="play-icon">▶</div>
                  <div class="thumb-label">${m.tag}</div>
                </div>
                <div class="media-info">
                  <h3>${m.title}</h3>
                  <p>${m.artist}</p>
                </div>
                <div class="yt-link-bar">▶ YouTube에서 검색하기</div>
              </a>
            `;
      }

      function switchTab(tab, key, el) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));
        el.classList.add("active");
        document.getElementById(`tab-${tab}-${key}`).classList.add("active");
      }

      function goBack() {
        document.getElementById("content-area").innerHTML = "";
        document
          .querySelectorAll(".emotion-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .getElementById("emotion-selector")
          .scrollIntoView({ behavior: "smooth" });
      }
    </script>
  </body>
